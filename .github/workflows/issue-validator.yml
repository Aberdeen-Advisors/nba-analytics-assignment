name: Issue Validator

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to re-validate
        required: true
      issue_title:
        description: Issue title
        required: true
      issue_body:
        description: Issue body
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Configure git
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Validate issue
        id: validate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
          ISSUE_TITLE: ${{ github.event.issue.title || inputs.issue_title }}
          ISSUE_BODY: ${{ github.event.issue.body || inputs.issue_body }}
        run: python .github/scripts/validate_issue.py

      - name: Email coordinator
        if: steps.validate.outputs.action == 'escalate'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: prath@aberdeenadv.com
          password: ${{ secrets.SMTP_PASSWORD }}
          to: prath@aberdeenadv.com
          from: NBA Analytics Bot <prath@aberdeenadv.com>
          subject: "Intern submission question — Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          body: |
            An intern has a submission question that needs your response.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Reply on GitHub: ${{ github.event.issue.html_url }}
